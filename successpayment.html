<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Successful</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .card-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ---- LEFT PANEL ---- */
    .left-panel {
      background: #1a2e4a;
      width: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 50px 40px;
    }

    .left-illustration {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .left-illustration img {
      max-width: 280px;
      width: 100%;
      height: auto;
    }

    /* Contact row */
    .contact-row {
      display: flex;
      gap: 10px;
      width: 70%;
      margin-bottom: 14px;
    }
    .contact-pill {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 9px 8px;
      color: #fff;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
    }
    .contact-pill svg { flex-shrink: 0; }

    /* Buttons */
    .btn-print {
      width: 70%;
      background: #e8b84b;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 11px;
      margin-bottom: 10px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background 0.2s;
    }
    .btn-print:hover { background: #d4a236; }

    .btn-new-sale {
      width: 70%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      color: #fff;
      font-weight: 500;
      font-size: 14px;
      padding: 11px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }
    .btn-new-sale:hover { background: rgba(255,255,255,0.08); }

    /* ---- RIGHT PANEL ---- */
    .right-panel {
      background: #fff;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 70px;
    }

    .success-header {
      text-align: center;
      margin-bottom: 22px;
    }
    .scooter-img {
      width: 140px;
      height: auto;
      margin: 0 auto 8px;
    }
    .scooter-img img {
      width: 100%;
      height: auto;
    }

    .success-title {
      color: #e8b84b;
      font-size: 17px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* Info rows */
    .info-table {
      width: 100%;
      margin-bottom: 16px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }
    .info-label {
      color: #888;
      font-size: 13px;
    }
    .info-value {
      color: #222;
      font-size: 13px;
      font-weight: 500;
    }
    .info-value.orange { color: #e8b84b; }

    .divider {
      /* border: none; */
      /* border-top: 1px dashed #e0e0e0; */
      margin: 12px 0;
    }

    /* Totals */
    .totals-table { width: 100%; }
    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    .total-label {
      color: #555;
      font-size: 13px;
    }
    .total-value {
      font-size: 13px;
      font-weight: 500;
    }
    .total-value.orange { color: #e8b84b; }
    .total-value.red { color: #e74c3c; }

    .grand-total-row {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid #C0C0C0;
      margin-top: 6px;
    }
    .grand-label {
      font-size: 15px;
      font-weight: 700;
      color: #222;
    }
    .grand-value {
      font-size: 15px;
      font-weight: 700;
      color: #e8b84b;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 600px) {
      .card-wrapper {
        flex-direction: column;
      }
      .left-panel {
        width: 100%;
        padding: 30px 24px;
      }
      .left-illustration { min-height: 200px; }
      .right-panel { padding: 30px 24px; }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="left-illustration">
        <img src="/assets/imgs/receiptlogin.png" alt="illustration"/>
      </div>

      <!-- Contact -->
      <div class="contact-row">
        <div class="contact-pill">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3l2 4-2 2a16 16 0 006 6l2-2 4 2v3a2 2 0 01-2 2A18 18 0 013 5z"/>
          </svg>
          +123 456 789
        </div>
        <div class="contact-pill">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          easypay@gmail.com
        </div>
      </div>

      <button class="btn-print">Print Receipt</button>
      <button class="btn-new-sale">New Sale</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="success-header">
        <!-- Scooter Illustration -->
        <div class="scooter-img">
          <img src="/assets/imgs/receipt2.png" alt="delivery scooter"/>
        </div>
        <div class="success-title">Order Successful</div>
      </div>

      <div class="info-table">
        <div class="info-row">
          <span class="info-label">No Transaction</span>
          <span class="info-value orange">Order #4589</span>
        </div>
        <div class="info-row">
          <span class="info-label">Table</span>
          <span class="info-value">T 12</span>
        </div>
        <div class="info-row">
          <span class="info-label">Payment</span>
          <span class="info-value">Cash</span>
        </div>
      </div>

      <hr class="divider"/>

      <div class="info-row" style="margin-bottom:12px;">
        <span class="info-label">Total item</span>
        <span class="info-value">3 item</span>
      </div>


      <hr class="divider"/>

      <div class="totals-table">
        <div class="total-row">
          <span class="total-label">Subtotal</span>
          <span class="total-value orange">$41.91</span>
        </div>
        <div class="total-row">
          <span class="total-label">Discount</span>
          <span class="total-value red">-$5.00</span>
        </div>
        <div class="total-row">
          <span class="total-label">Sales Tax (15%)</span>
          <span class="total-value orange">$5.00</span>
        </div>
        <div class="grand-total-row">
          <span class="grand-label">Total</span>
          <span class="grand-value">$41.91</span>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelector('.btn-print').addEventListener('click', () => window.print());
    document.querySelector('.btn-new-sale').addEventListener('click', () => {
      alert('New Sale started!');
    });
  </script>
</body>
</html>
