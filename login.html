<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy POS - Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/login.css">

    <style>
        /* ===== SLIDER STYLES ===== */
        .left-side {
            background-color: #1a2f5a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        /* Slider Container */
        .slider-container {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Slides Wrapper */
        .slides-wrapper {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Individual Slide */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
        }

        .slide.prev {
            opacity: 0;
            transform: translateX(-100%);
        }

        /* Slide Image */
        .slide-img {
            width: 75%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Slide Text */
        .slide-text {
            text-align: center;
            margin-top: 30px;
            color: #fff;
        }

        .slide-text h2 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .slide-text p {
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 300px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Dots Navigation */
        .slider-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 20px 0 35px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            padding: 0;
        }

        .dot.active {
            width: 24px;
            border-radius: 4px;
            background: #f5a623;
        }

        .dot:hover {
            background: rgba(255, 255, 255, 0.65);
        }

        /* Background subtle pattern */
        .left-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            pointer-events: none;
        }

        .left-side::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -15%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="container-fluid">
        <div class="row">
            
            <!-- Left Side - Slider Section -->
            <div class="col-lg-6 left-side order-1 order-lg-0">
                <div class="slider-container">
                    
                    <!-- Slides Wrapper -->
                    <div class="slides-wrapper" id="slidesWrapper">

                        <!-- Slide 1 -->
                        <div class="slide active" data-index="0">
                            <img src="assets/imgs/main.png" alt="POS Illustration 1" class="slide-img">
                            <!-- <div class="slide-text">
                                <h2>Easy Point of Sale</h2>
                                <p>Manage your business transactions quickly and efficiently with our smart POS system.</p>
                            </div> -->
                        </div>

                        <!-- Slide 2 -->
                        <div class="slide" data-index="1">
                            <img src="assets/imgs/f2569f3601466f07cee51d035d37f9f4a4382cd7.png" alt="POS Illustration 2" class="slide-img" >
                            <!-- <div class="slide-text">
                                <h2>Real-Time Reports</h2>
                                <p>Track your sales, inventory, and performance with live analytics and detailed reports.</p>
                            </div> -->
                        </div>

                        <!-- Slide 3 -->
                        <div class="slide" data-index="2">
                            <img src="assets/imgs/8494f8f0f2fd5e30aa4c0bf7a6541207d3c7f34e.png" alt="POS Illustration 3" class="slide-img" >
                            <!-- <div class="slide-text">
                                <h2>Secure & Reliable</h2>
                                <p>Your data is protected with enterprise-grade security so you can focus on your business.</p>
                            </div> -->
                        </div>

                    </div>

                    <!-- Dots Navigation -->
                    <div class="slider-dots" id="sliderDots">
                        <button class="dot active" data-dot="0" aria-label="Slide 1"></button>
                        <button class="dot" data-dot="1" aria-label="Slide 2"></button>
                        <button class="dot" data-dot="2" aria-label="Slide 3"></button>
                    </div>

                </div>
            </div>

            <!-- Right Side - Form Section -->
            <div class="col-lg-6 right-side">
                <div class="form-wrapper">
                    
                    <!-- Brand Title -->
                    <!-- <h1 class="brand-title">Easy <span class="highlight">POS</span></h1> -->
                    <div class="d-flex justify-content-center mb-4">
                         <img src="assets/imgs/logo.png" width="40%" alt="">
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="login-form">
                        
                        <!-- Email Field -->
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <img src="assets/imgs/Email.png" alt="Email Icon" class="icon icon-left">
                                <input type="email" id="email" name="email" class="input-field" required>
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <img src="assets/imgs/Lock.png" alt="Lock Icon" class="icon icon-left">
                                <input type="password" id="password" name="password" class="input-field" required>
                                <i class="fa-solid fa-eye icon icon-right toggle-password" id="togglePassword"></i>
                            </div>
                        </div>

                        <!-- Remember & Forgot -->
                        <div class="form-row">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="remember" name="remember">
                                <label for="remember">Remember me</label>
                            </div>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>

                        <!-- Login Button -->
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn-primary">Login</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // ===== PASSWORD TOGGLE =====
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordField = document.getElementById('password');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // ===== IMAGE SLIDER =====
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;
        let autoSlideInterval;

        function goToSlide(index) {
            // Remove active/prev from all
            slides.forEach(s => {
                s.classList.remove('active', 'prev');
            });
            dots.forEach(d => d.classList.remove('active'));

            // Mark previous slide
            slides[currentSlide].classList.add('prev');

            // Update current
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');

            // Remove prev class after transition
            setTimeout(() => {
                slides.forEach(s => s.classList.remove('prev'));
            }, 650);
        }

        function nextSlide() {
            const next = (currentSlide + 1) % slides.length;
            goToSlide(next);
        }

        function startAutoSlide() {
            autoSlideInterval = setInterval(nextSlide, 3500);
        }

        function resetAutoSlide() {
            clearInterval(autoSlideInterval);
            startAutoSlide();
        }

        // Dot click handlers
        dots.forEach(dot => {
            dot.addEventListener('click', function () {
                const index = parseInt(this.getAttribute('data-dot'));
                if (index !== currentSlide) {
                    goToSlide(index);
                    resetAutoSlide();
                }
            });
        });

        // Start auto sliding
        startAutoSlide();
    </script>
</body>
</html>
