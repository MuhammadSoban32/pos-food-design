<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Confirmation Modal</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        /* Delete Modal Overlay */
        .delete-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .delete-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* Modal Box */
        .delete-modal-box {
            background-color: #fff;
            border-radius: 16px;
            padding: 40px 35px 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .delete-modal-overlay.show .delete-modal-box {
            transform: scale(1);
        }

        /* Close Button */
        .delete-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .delete-modal-close:hover {
            color: #333;
            transform: rotate(90deg);
        }

        /* Delete Icon */
        .delete-icon-wrapper {
            margin-bottom: 25px;
        }

        .delete-modal-icon {
            width: 70px;
            height: 70px;
            color: #ff6b35;
            font-size: 70px;
        }

        /* Modal Text */
        .delete-modal-text {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        /* Action Buttons */
        .delete-modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .delete-modal-yes {
            padding: 12px 32px;
            background-color: #3d5a80;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-modal-yes:hover {
            background-color: #2c4563;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(61, 90, 128, 0.3);
        }

        .delete-modal-cancel {
            padding: 10px 30px;
            background-color: #fff;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #ff6b35;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-modal-cancel:hover {
            background-color: #fff5f2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.2);
        }

        /* Demo Button (for testing) */
        .demo-btn {
            /* position: absolute; */
            /* top: 50%; */
            /* left: 50%; */
            /* transform: translate(-50%, -50%); */
            padding: 15px 30px;
            background-color: #3d5a80;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }

        
        /* ===== Overlay ===== */
        .um-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .um-modal-overlay.um-show {
            opacity: 1;
            visibility: visible;
        }

        /* ===== Modal Box ===== */
        .um-modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 35px 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: 0.3s ease;
        }

        .um-modal-overlay.um-show .um-modal-box {
            transform: scale(1);
        }

        /* ===== Close Button ===== */
        .um-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .um-modal-close:hover {
            color: #000;
            transform: rotate(90deg);
        }

        /* ===== Icon ===== */
        .um-modal-icon-wrap {
            margin-bottom: 25px;
        }

        .um-modal-icon {
            width: 70px;
            height: 70px;
            color: #ff6b35;
        }

        /* ===== Text ===== */
        .um-modal-text {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            margin-bottom: 30px;
        }

        /* ===== Buttons ===== */
        .um-modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* .um-btn-confirm {
            padding: 12px 32px;
            background: #3d5a80;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            color: #fff;
            transition: 0.3s ease;
        }

        .um-btn-confirm:hover {
            background: #2c4563;
            transform: translateY(-2px);
        } */

        .um-btn-cancel {
            padding: 10px 30px;
            background: #fff;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            font-weight: 600;
            color: #ff6b35;
            transition: 0.3s ease;
        }

        .um-btn-cancel:hover {
            background: #fff5f2;
            transform: translateY(-2px);
        }

        /* Demo button */
        .um-demo-btn {
            /* position: absolute; */
            /* top: 50%; */
            /* left: 50%; */
            /* transform: translate(-50%, -50%); */
            padding: 14px 28px;
            background: #3d5a80;
            border: none;
            border-radius: 8px;
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .um-modal-box {
                padding: 25px 20px;
            }
        }

    </style>
</head>
<body>

    <!-- Demo Button (Remove this in production) -->
    <button class="demo-btn" onclick="openDeleteModal()">Open Delete Modal</button>
    <button class="um-demo-btn" onclick="openUmModal()">user Delete Modal</button>


    <!-- Delete Confirmation Modal -->
    <div class="delete-modal-overlay" id="deleteModal">
        <div class="delete-modal-box">
            
            <!-- Close Button (Top Right) -->
            <button class="delete-modal-close" onclick="closeDeleteModal()">×</button>
            
            <!-- Delete Icon -->
            <div class="delete-icon-wrapper">
                <svg class="delete-modal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 6h18v2H3V6zm2 3h14l-1 14H6L5 9zm5-6h4v1H10V3z"/>
                </svg>
            </div>
            
            <!-- Message -->
            <p class="delete-modal-text">Do you really want to delete this user?</p>
            
            <!-- Action Buttons -->
            <div class="delete-modal-actions">
                <button class="delete-modal-yes" onclick="confirmDelete()">Yes</button>
                <button class="delete-modal-cancel" onclick="closeDeleteModal()">Cancel</button>
            </div>
            
        </div>
    </div>

    <!-- button 2  -->

     <!-- Modal -->
    <div class="um-modal-overlay" id="umModal">
        <div class="um-modal-box">
            
            <button class="um-modal-close" onclick="closeUmModal()">×</button>
            
            <div class="um-modal-icon-wrap">
                <img src="assets/imgs/tick.png" alt="">
                <!-- <svg class="um-modal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 6h18v2H3V6zm2 3h14l-1 14H6L5 9zm5-6h4v1H10V3z"/>
                </svg> -->
            </div>
            
            <p class="um-modal-text">
                User Sucessfully Deleted
            </p>
            
            <div class="um-modal-actions">
                <!-- <button class="um-btn-confirm" onclick="confirmUmDelete()">Yes</button> -->
                <button class="um-btn-cancel" onclick="closeUmModal()">OK</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Open Modal
        function openDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.add('show');
        }

        // Close Modal
        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('show');
        }

        // Confirm Delete
        function confirmDelete() {
            console.log('User deleted!');
            alert('User has been deleted successfully!');
            closeDeleteModal();
            // Add your actual delete logic here
        }

        // Close on outside click
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeleteModal();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeDeleteModal();
            }
        });

        // Auto-attach to all delete buttons
        document.addEventListener('DOMContentLoaded', function() {
            const deleteBtns = document.querySelectorAll('.ae-delete-btn, .um-delete-btn, .ac-delete-btn, [data-delete]');
            
            deleteBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    openDeleteModal();
                });
            });
        });
    </script>

    <script>

function openUmModal() {
    document.getElementById('umModal').classList.add('um-show');
}

function closeUmModal() {
    document.getElementById('umModal').classList.remove('um-show');
}

function confirmUmDelete() {
    alert("User deleted successfully!");
    closeUmModal();
}

/* Outside click close */
document.getElementById('umModal').addEventListener('click', function(e){
    if(e.target === this){
        closeUmModal();
    }
});

/* Escape key close */
document.addEventListener('keydown', function(e){
    if(e.key === "Escape"){
        closeUmModal();
    }
});

</script>

</body>
</html>
