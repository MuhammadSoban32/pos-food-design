<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy POS - Header</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Google Fonts -->

        <!-- Chart.js Library -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script> -->

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>


<body>
    
    <!-- Header -->
    <header class="header">

            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>

        </button>
         <button class="hamburger" id="hamburger">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        <!-- Logo -->
        <div class="logo">
            <span class="logo-text">Easy <span class="logo-highlight">POS</span></span>
        </div>

        <!-- Navigation Links -->
        <nav class="nav-links" id="navLinks">
            <a href="#" class="nav-link">Dashboard</a>
            <a href="#" class="nav-link">Order List</a>
            <a href="#" class="nav-link">History</a>
            <a href="#" class="nav-link">Bills</a>
        </nav>

        <!-- Right Actions -->
        <div class="header-actions">
            <button class="btn-new-order">New Order</button>

            <div class="notification-btn">
                <img src="../assets/imgs/bellicon.png" alt="Notifications" class="notification-icon">
            </div>

            <div class="user-profile">
                <img src="../assets/imgs/Ellipse 1.png" alt="User Profile" class="user-avatar">

        </div>

    </header>


    <div class="dashboard-wrapper">

        <aside class="sidebar">
        
        <!-- Navigation Menu -->
        <nav class="sidebar-nav">
            
            <!-- Home - Active with Green Background -->
            <a href="#" class="nav-item active">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/Home Page.png" alt="Home" class="nav-icon">
                </div>
                <span class="nav-text">Home</span>
            </a>
            
            <!-- Customer -->
            <a href="#" class="nav-item">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/orders.png" alt="Order Cancel" class="nav-icon">
                </div>
                <span class="nav-text">Order Cancel</span>
            </a>
            
            <!-- Tables -->
            <a href="#" class="nav-item">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/Order History.png" alt="Order HIstory" class="nav-icon">
                </div>
                <span class="nav-text">Order History</span>
            </a>
            
            <!-- Cashier -->
            <a href="#" class="nav-item">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/Settings.png" alt="Settings" class="nav-icon">
                </div>
                <span class="nav-text">Settings</span>

            <!-- Orders -->

                <div class="nav-icon-box">
                    <img src="../assets/imgs/Customer.png" alt="Customers" class="nav-icon">
                </div>
                <span class="nav-text">Customers</span>
            </a>
            
            <!-- Reports -->
            <a href="#" class="nav-item">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/tablet.png" alt="Tablets" class="nav-icon">
                </div>
                <span class="nav-text">Tablets</span>
            </a>
            
            <!-- Settings -->

            
        </nav>
        
        <!-- User Profile Section at Bottom -->
        <div class="sidebar-footer">
            
            <!-- User Avatar -->
            <div class="user-avatar-wrapper">
                <img src="../assets/imgs/Ellipse 1.png" alt="User Profile" class="user-avatar">
            </div>
            
            <!-- Logout -->
            <a href="#" class="nav-item logout">
                <div class="nav-icon-box">
                    <img src="../assets/imgs/Logout.png" alt="Logout" class="nav-icon">
                </div>

    <!-- Settings Page - CORRECT -->
<main class="main-content set">
    
    <!-- Settings Header -->
    <div class="form-header">
        <h1 class="form-title">Add Users</h1>
        <div class="form-actions">
           <button class="footer-cancel-btn">Cancel</button>
        <button class="footer-save-btn">Save</button>
        </div>
    </div>

    <!-- Settings Content -->
    <div class="container-fluid px-0 edit1">
        <div class="row g-4">
            
            <!-- LEFT COLUMN - Profile Photo -->
            <div class="col-lg-2 col-md-3">
                <div class="settings-photo-box">
                    <img src="../assets/imgs/Rectangle 120.png" alt="Profile" class="settings-profile-photo">
                    <button class="settings-upload-photo-btn">
                        <img src="../assets/imgs/Downloads (1).png" alt="Upload" class="settings-upload-icon-img">
                        Upload Photo
                    </button>
                </div>
            </div>

            <!-- MIDDLE COLUMN - User Details -->
            <div class="col-lg-5 col-md-4">
                <div class="settings-form-section">
                    <h3 class="settings-section-heading">User Details</h3>

                    <!-- User ID -->
                    <div class="settings-input-group">
                        <label class="settings-label">User ID</label>
                        <input type="text" class="settings-input" value="123 456 789" readonly>
                    </div>

                    <!-- Full Name -->
                    <div class="settings-input-group">
                        <label class="settings-label">Full Name</label>
                        <input type="text" class="settings-input" placeholder="Anas Ahmed Khan">
                    </div>

                    <!-- CNIC -->
                    <div class="settings-input-group">
                        <label class="settings-label">CNIC</label>
                        <input type="text" class="settings-input" placeholder="43104 4526 78900">
                    </div>

                    <!-- City Name -->
                    <div class="settings-input-group">
                        <label class="settings-label">City Name</label>
                        <input type="text" class="settings-input" placeholder="Hyderabad">
                    </div>

                    <!-- Contact Number -->
                    <div class="settings-input-group">
                        <label class="settings-label">Contact Number</label>
                        <input type="text" class="settings-input" placeholder="+923 1234 567">
                    </div>

                </div>
            </div>

            <!-- RIGHT COLUMN - Personal Details -->
            <div class="col-lg-5 col-md-5">
                <div class="settings-form-section">
                    <h3 class="settings-section-heading">Personal Details</h3>

                    <!-- Email -->
                    <div class="settings-input-group">
                        <label class="settings-label">Email</label>
                        <input type="email" class="settings-input" placeholder="anaskhan@gmail.com">
                    </div>

                    <!-- Home Address -->
                    <div class="settings-input-group">
                        <label class="settings-label">Home Address</label>
                        <input type="text" class="settings-input" placeholder="Street number 4103">
                    </div>

                    <!-- Role -->
                    <div class="settings-input-group">
                        <label class="settings-label">Role</label>
                        <select class="settings-select settings-role-select">
                            <option>Super Admin</option>
                            <option>Sales Person</option>
                            <option>Manager</option>
                        </select>
                        <!-- Dropdown Options Display -->
                        <div class="settings-role-dropdown" style="display: none;">
                            <div class="settings-role-option active">Super Admin</div>
                            <div class="settings-role-option">Sales Person</div>
                            <div class="settings-role-option">Manager</div>
                        </div>
                    </div>

                    <!-- Status -->
                    <div class="settings-input-group">
                        <label class="settings-label">Status</label>
                        <select class="settings-select">
                            <option>Active</option>
                            <option>Inactive</option>
                        </select>
                        <!-- Dropdown Options Display -->
                        <div class="settings-status-dropdown" style="display: none;">
                            <div class="settings-status-option">
                                <span class="settings-status-icon active-icon">👤</span> Active
                            </div>
                            <div class="settings-status-option">
                                <span class="settings-status-icon inactive-icon">👤</span> Inactive
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="settings-input-group">
                        <label class="settings-label">Password</label>
                        <div class="settings-password-container">
                            <input type="password" class="settings-input" placeholder="••••••••">
                            <button class="settings-eye-btn">
                                <img src="../assets/imgs/Hide.png" alt="Show" class="settings-eye-img">
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</main>

</div>

    <!-- JavaScript for Hamburger -->
    <script src="../assets/javascript/custom.js"></script>
    <script>
        function switchTab(tab) {
    const generalContent = document.getElementById('generalContent');
    const advancedContent = document.getElementById('advancedContent');
    const tabBtns = document.querySelectorAll('.tab-button');

    tabBtns.forEach(btn => btn.classList.remove('active'));

    if (tab === 'general') {
        generalContent.style.display = 'block';
        advancedContent.style.display = 'none';
        tabBtns[0].classList.add('active');
    } else {
        generalContent.style.display = 'none';
        advancedContent.style.display = 'block';
        tabBtns[1].classList.add('active');
    }
}

    </script>
</body>
</html>
