    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        /* Delete Modal Overlay */
        .delete-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .delete-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* Modal Box */
        .delete-modal-box {
            background-color: #fff;
            border-radius: 16px;
            padding: 40px 35px 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .delete-modal-overlay.show .delete-modal-box {
            transform: scale(1);
        }

        /* Close Button */
        .delete-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .delete-modal-close:hover {
            color: #333;
            transform: rotate(90deg);
        }

        /* Delete Icon */
        .delete-icon-wrapper {
            margin-bottom: 25px;
        }

        .delete-modal-icon {
            width: 70px;
            height: 70px;
            color: #ff6b35;
            font-size: 70px;
        }

        /* Modal Text */
        .delete-modal-text {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        /* Action Buttons */
        .delete-modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .delete-modal-yes {
            padding: 12px 32px;
            background-color: #3d5a80;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-modal-yes:hover {
            background-color: #2c4563;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(61, 90, 128, 0.3);
        }

        .delete-modal-cancel {
            padding: 10px 30px;
            background-color: #fff;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #ff6b35;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-modal-cancel:hover {
            background-color: #fff5f2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.2);
        }

        /* Demo Button (for testing) */
        .demo-btn {
            /* position: absolute; */
            /* top: 50%; */

            /* transform: translate(-50%, -50%); */
            padding: 15px 30px;

            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;

        }

        
        /* ===== Overlay ===== */
        .um-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;

        }

        .um-modal-overlay.um-show {

            visibility: visible;
        }

        /* ===== Modal Box ===== */
        .um-modal-box {
            background: #fff;

            padding: 40px 35px 35px;
            max-width: 420px;

        }

        /* ===== Close Button ===== */
        .um-modal-close {

        /* ===== Icon ===== */

        .um-modal-icon {

            height: 70px;

        }

        /* ===== Text ===== */
        .um-modal-text {
            font-size: 17px;
            font-weight: 500;

    <div class="import-overlay" id="importModal">
    <div class="import-box">

        <!-- Dropzone Form -->
        <form action="#" class="dropzone" id="excelDropzone">
            <div class="dz-message">
                <img src="https://img.icons8.com/color/96/microsoft-excel-2019.png" width="60" class="mb-3"><br>
                Drag & Drop file here or <strong>Choose file</strong>
                <div class="mt-3 small text-muted">

                </div>
            </div>
        </form>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Open Modal
        function openDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.add('show');
        }

        // Close Modal
        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('show');
        }

        // Confirm Delete
        function confirmDelete() {
            console.log('User deleted!');
            alert('User has been deleted successfully!');
            closeDeleteModal();
            // Add your actual delete logic here
        }

        // Close on outside click
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeleteModal();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeDeleteModal();
            }
        });

        // Auto-attach to all delete buttons
        document.addEventListener('DOMContentLoaded', function() {
            const deleteBtns = document.querySelectorAll('.ae-delete-btn, .um-delete-btn, .ac-delete-btn, [data-delete]');
            
            deleteBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    openDeleteModal();
                });
            });
        });
    </script>

function openUmModal() {

<!-- button 3 dropbox  -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/dropzone.min.js"></script>

<script>
Dropzone.autoDiscover = false;

const myDropzone = new Dropzone("#excelDropzone", {
    url: "/upload", // backend route
    autoProcessQueue: false,
    maxFiles: 1,
    maxFilesize: 25,
    acceptedFiles: ".xls,.xlsx,.csv"
});

function openImport(){
    document.getElementById('importModal').classList.add('show');
}

function closeImport(){
    document.getElementById('importModal').classList.remove('show');
}

function submitImport(){
    if(myDropzone.files.length === 0){
        alert("Please select a file first!");
        return;
    }
    alert("File Ready to Upload!");
    // myDropzone.processQueue();  // Enable when backend ready
    closeImport();
}

/* Close on outside click */
document.getElementById('importModal').addEventListener('click', function(e){
    if(e.target === this){
        closeImport();
    }
});
</script>
